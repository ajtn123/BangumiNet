name: Update Bangumi Open API Client

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: microsoft/setup-kiota@v0.5.0
      - uses: actions/checkout@v7

      - name: Download API Description
        run: curl -L -o v0.yaml https://github.com/bangumi/api/raw/refs/heads/master/open-api/v0.yaml

      - name: Pre-Process API Description
        run: pwsh BangumiNet.Api/PreGeneration.ps1 v0.yaml

      - name: Update API Client
        run: kiota update --clean-output -o BangumiNet.Api/V0

      - name: Post-Process Generated Code
        run: pwsh BangumiNet.Api/PostGeneration.ps1 BangumiNet.Api/V0

      - name: Apply Patch
        run: git apply BangumiNet.Api/v0.patch

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'feat: update Bangumi Open API client'
          title: Update Bangumi Open API Client
          body: Update Bangumi Open API client to match API version `${{ env.API_VERSION }}`
          branch: feat/update-v0
