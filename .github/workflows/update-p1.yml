name: Update Bangumi Private API Client

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: microsoft/setup-kiota@v0.6.0
      - uses: actions/checkout@v7

      - name: Download API Description
        run: curl -L -o p1.yaml https://next.bgm.tv/p1/openapi.yaml

      - name: Pre-Process API Description
        run: pwsh BangumiNet.Api/PreGeneration.ps1 p1.yaml

      - name: Update API Client
        run: kiota update --clean-output -o BangumiNet.Api/P1

      - name: Post-Process Generated Code
        run: pwsh BangumiNet.Api/PostGeneration.ps1 BangumiNet.Api/P1

      - name: Apply Patch
        run: git apply BangumiNet.Api/p1.patch

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'feat: update Bangumi Private API client'
          title: Update Bangumi Private API Client
          body: Update Bangumi Private API client to match API version `${{ env.API_VERSION }}`
          branch: feat/update-p1
